<span id="share-label">Share</span>

<script>
const MIN_CONFIDENCE = 0.5;
const params = new URLSearchParams(location.search);
const selectedId = params.get('id');
const content = document.querySelector('#content');
const status = document.querySelector('#status');
const shareBar = document.querySelector('#share-bar');
const shareButton = document.querySelector('#share-button');
const shareLabel = document.querySelector('#share-label');
let currentBottle = null;

function setText(selector, value) {
  document.querySelector(selector).textContent = value || '-';
}

function getConfidence(bottle) {
  return bottle.identification?.confidence ?? bottle.identificationConfidence ?? 0;
}

function renderBottle(bottle) {
  currentBottle = bottle;
  document.title = `${bottle.name} | SPEAKEASY`;
  const image = document.querySelector('#bottle-image');
  image.src = bottle.image;
  image.alt = bottle.name;

  setText('#bottle-subtitle', bottle.subtitle || bottle.category);
  setText('#bottle-name', bottle.name);
  setText('#bottle-region', bottle.region);
  setText('#bottle-abv', bottle.abv);
  setText('#bottle-age', bottle.age);
  setText('#bottle-description', bottle.description);
  setText('#note-nose', bottle.notes?.nose);
  setText('#note-palate', bottle.notes?.palate);
  setText('#note-finish', bottle.notes?.finish);
  setText('#hook-message', bottle.hookMessage || `${bottle.name}, 오늘의 메뉴를 오래 기억하게 할 한 잔.`);

  status.classList.add('hidden');
  content.classList.remove('hidden');
  shareBar.classList.remove('hidden');
}

async function resolveBottleId() {
  if (selectedId) return selectedId;

  const response = await fetch('data/bottles.index.json');
  if (!response.ok) throw new Error(`보틀 목록을 불러오지 못했습니다: ${response.status}`);
  const bottles = await response.json();
  return bottles.find((bottle) => (bottle.identificationConfidence ?? 0) >= MIN_CONFIDENCE)?.id;
}

async function loadBottle() {
  try {
    const bottleId = await resolveBottleId();
    if (!bottleId) throw new Error('표시할 보틀이 없습니다.');

    const response = await fetch(`data/bottles/${encodeURIComponent(bottleId)}.json`);
    if (!response.ok) throw new Error(`보틀 상세 데이터를 불러오지 못했습니다: ${response.status}`);
    const bottle = await response.json();
    if (getConfidence(bottle) < MIN_CONFIDENCE) throw new Error('검수 기준 미달 보틀입니다.');
    renderBottle(bottle);
  } catch (error) {
    console.error(error);
    status.textContent = '보틀 정보를 불러오지 못했습니다.';
  }
}

async function shareBottle() {
  if (!currentBottle) return;

  const shareData = {
    title: `${currentBottle.name} | SPEAKEASY`,
    text: currentBottle.hookMessage || currentBottle.description || currentBottle.name,
    url: location.href,
  };

  try {
    if (navigator.share) {
      await navigator.share(shareData);
      return;
    }

    await navigator.clipboard.writeText(shareData.url);
    shareLabel.textContent = 'Copied';
    setTimeout(() => {
      shareLabel.textContent = 'Share';
    }, 1600);
  } catch (error) {
    console.error(error);
  }
}

shareButton.addEventListener('click', shareBottle);
loadBottle();
</script>
