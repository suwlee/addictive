<body class="bg-background text-on-background font-body-md antialiased">

<div class="flex items-center gap-4">

<h1 class="text-primary dark:text-primary-fixed text-[32px] leading-none tracking-[-0.08em] font-black" style="font-family: Futura, 'Futura PT', 'Arial Black', Arial, sans-serif;">ADD:CT:VE</h1>

</header>
<main class="pt-20 pb-10 px-container-margin">
<section class="mb-stack-lg">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-unit">The Cellar</h2>
<p class="font-body-md text-body-md text-on-surface-variant">엄선한 보틀을 한눈에 둘러보고 상세 정보를 확인하세요.</p>
</section>
<nav id="category-filters" class="flex overflow-x-auto hide-scrollbar gap-stack-md mb-section-gap -mx-container-margin px-container-margin"></nav>
<div id="bottle-grid" class="grid gap-stack-lg grid-cols-2"></div>
<p id="empty-state" class="hidden text-center text-on-surface-variant font-body-md py-section-gap">표시할 보틀이 없습니다.</p>
</main>
<template id="category-template">
<button class="flex-shrink-0 px-stack-lg py-2 rounded-full font-label-lg text-label-lg transition-all active:scale-95"></button>
</template>
<template id="bottle-card-template">
<a class="group relative overflow-hidden rounded-xl bg-surface-container shadow-lg border border-white/5 aspect-square flex flex-col active:scale-[0.98] transition-transform" href="#">
<div class="h-1/2 relative bg-surface-container-lowest/50">
<img class="absolute inset-0 w-full h-full object-contain p-2 transition-transform duration-700 group-hover:scale-105" alt="">
<div class="absolute top-2 left-2"><span class="region font-label-md text-[10px] text-primary bg-primary-container/20 px-1.5 py-0.5 rounded backdrop-blur-sm"></span></div>
</div>
<div class="flex-1 p-3 flex flex-col justify-center">
<div class="space-y-1 text-center">
<h3 class="name font-headline-sm text-sm text-on-surface line-clamp-1"></h3>
<p class="subtitle font-label-md text-[10px] text-primary line-clamp-1"></p>
<div class="flavors flex flex-wrap gap-1 justify-center"></div>
</div>
</div>
</a>
</template>
<script>
const MIN_CONFIDENCE = 0.5;

const state = {
  bottles: [],
  selectedCategory: 'All'
};

const categoryFilters = document.querySelector('#category-filters');
const bottleGrid = document.querySelector('#bottle-grid');
const emptyState = document.querySelector('#empty-state');
const categoryTemplate = document.querySelector('#category-template');
const bottleCardTemplate = document.querySelector('#bottle-card-template');

function setSelectedCategory(category) {
  state.selectedCategory = category;
  renderCategories();
  renderBottles();
}

function getCategories() {
  const categories = state.bottles.map((bottle) => bottle.category).filter(Boolean);
  return ['All', ...new Set(categories)];
}

function renderCategories() {
  categoryFilters.replaceChildren();

  for (const category of getCategories()) {
    const button = categoryTemplate.content.firstElementChild.cloneNode(true);
    button.textContent = category;
    button.type = 'button';
    button.setAttribute('aria-pressed', String(category === state.selectedCategory));
    button.className += category === state.selectedCategory
      ? ' bg-primary-container text-on-primary-container'
      : ' bg-surface-variant/30 text-on-surface-variant border border-outline-variant hover:bg-surface-variant/50';
    button.addEventListener('click', () => setSelectedCategory(category));
    categoryFilters.append(button);
  }
}

function getVisibleBottles() {
  if (state.selectedCategory === 'All') return state.bottles;
  return state.bottles.filter((bottle) => bottle.category === state.selectedCategory);
}

function renderBottles() {
  const visibleBottles = getVisibleBottles();
  bottleGrid.replaceChildren();
  emptyState.classList.toggle('hidden', visibleBottles.length > 0);

  for (const bottle of visibleBottles) {
    const card = bottleCardTemplate.content.firstElementChild.cloneNode(true);
    const image = card.querySelector('img');
    const region = card.querySelector('.region');
    const name = card.querySelector('.name');
    const subtitle = card.querySelector('.subtitle');
    const flavors = card.querySelector('.flavors');

    card.href = `detail.html?id=${encodeURIComponent(bottle.id)}`;
    image.src = bottle.image;
    image.alt = bottle.name;
    region.textContent = bottle.region || bottle.category || '';
    name.textContent = bottle.name;
    subtitle.textContent = bottle.subtitle || bottle.category || '';

    for (const [index, flavor] of (bottle.flavors || []).entries()) {
      const span = document.createElement('span');
      span.className = 'font-label-md text-[10px] text-on-surface-variant';
      span.textContent = index === 0 ? flavor : `• ${flavor}`;
      flavors.append(span);
    }

    bottleGrid.append(card);
  }
}

async function loadBottles() {
  try {
    const response = await fetch('data/bottles.index.json');
    if (!response.ok) throw new Error(`보틀 데이터를 불러오지 못했습니다: ${response.status}`);
    const bottles = await response.json();
    state.bottles = bottles.filter((bottle) => (bottle.identificationConfidence ?? 0) >= MIN_CONFIDENCE);
    renderCategories();
    renderBottles();
  } catch (error) {
    console.error(error);
    emptyState.textContent = '보틀 데이터를 불러오지 못했습니다.';
    emptyState.classList.remove('hidden');
  }
}

loadBottles();
</script>
